<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LavaFácil — Atendimento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="painel">

    <!-- Cabeçalho -->
    <header class="painel-header">
      <div>
        <h1>👕 LavaFácil</h1>
        <p class="painel-subtitulo">Sistema de atendimento</p>
      </div>
      <div class="painel-badges">
        <span class="painel-badge badge-pendente" id="badge-pendentes">0 pendentes</span>
        <span class="painel-badge badge-atendido" id="badge-atendidos">0 atendidos</span>
      </div>
    </header>

    <!-- Formulário de cadastro -->
    <section class="secao">
      <h2 class="secao-titulo">Novo cliente</h2>
      <div class="form-grid">
        <input type="text" id="nome"     class="input-field" placeholder="Nome completo">
        <input type="tel"  id="telefone" class="input-field" placeholder="WhatsApp: (11) 99999-9999">
        <input type="text" id="obs"      class="input-field" placeholder="Observação (opcional): urgente, roupa pesada...">
      </div>
      <p class="input-erro" id="input-erro"></p>
      <button class="btn-cadastrar" onclick="adicionarCliente()">+ Cadastrar cliente</button>
    </section>

    <!-- Listas -->
    <section class="secao" id="lista-section" style="display:none">

      <!-- Ações globais -->
      <div class="lista-header">
        <h2 class="secao-titulo" style="margin-bottom:0">Clientes</h2>
        <div class="lista-acoes">
          <button class="btn-acao btn-copiar"   onclick="copiarContatos(this)">📋 Copiar</button>
          <button class="btn-acao btn-exportar" onclick="exportarDados()">⬇ Exportar</button>
          <button class="btn-acao btn-limpar"   onclick="limparLista()">Limpar tudo</button>
        </div>
      </div>

      <!-- Pendentes -->
      <div class="sublista">
        <p class="sublista-titulo pendente">⏳ Pendentes</p>
        <ul class="lista-clientes" id="lista-pendentes"></ul>
      </div>

      <!-- Atendidos -->
      <div class="sublista" id="sublista-atendidos" style="display:none">
        <p class="sublista-titulo atendido">✅ Atendidos</p>
        <ul class="lista-clientes" id="lista-atendidos"></ul>
      </div>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
